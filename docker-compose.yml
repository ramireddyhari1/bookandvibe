version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: bv-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-bv_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-bv_pass}
      POSTGRES_DB: ${DB_NAME:-book_and_vibe}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bv-net

  redis:
    image: redis:7-alpine
    container_name: bv-redis
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bv-net

  backend:
    build:
      context: ./backend
    container_name: bv-backend
    restart: always
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql://${DB_USER:-bv_user}:${DB_PASSWORD:-bv_pass}@bv-db:5432/${DB_NAME:-book_and_vibe}
      REDIS_URL: redis://bv-redis:6379
      PORT: 5000
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - bv-net

  web-app:
    build:
      context: ./web-app
      args:
        NEXT_PUBLIC_API_URL: https://api.bookandvibe.in/api
    container_name: bv-web
    restart: always
    environment:
      - PORT=3000
      - NODE_ENV=production
    depends_on:
      - backend
    networks:
      - bv-net

  admin-dashboard:
    build:
      context: ./admin-dashboard
      args:
        NEXT_PUBLIC_API_URL: https://api.bookandvibe.in/api
    container_name: bv-admin
    restart: always
    environment:
      - PORT=3001
      - NODE_ENV=production
    depends_on:
      - backend
    networks:
      - bv-net

  npm:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: bv-proxy
    restart: always
    ports:
      - '80:80'
      - '81:81'
      - '443:443'
    volumes:
      - ./nginx/data:/data
      - ./nginx/letsencrypt:/etc/letsencrypt
    depends_on:
      - web-app
      - admin-dashboard
      - backend
    networks:
      - bv-net

networks:
  bv-net:
    driver: bridge

volumes:
  postgres_data:
